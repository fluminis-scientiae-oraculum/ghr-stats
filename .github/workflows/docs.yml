name: docs

# Lint Markdown and check links. Runs only when docs or their config change.
on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint.jsonc"
      - "lychee.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.jsonc"
      - "lychee.toml"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--config lychee.toml --no-progress ./**/*.md"
          fail: true
